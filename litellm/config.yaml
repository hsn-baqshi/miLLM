# LiteLLM Proxy config: routes Open WebUI (OpenAI-compatible) to Ollama on the host.
# Ollama must be running on Windows; Docker reaches it via host.docker.internal:11434.
#
# Add one block per local model. model_name is what clients use; model must match ollama list.

model_list:
  - model_name: llama3.2
    litellm_params:
      model: ollama/llama3.2
      api_base: http://host.docker.internal:11434

general_settings:
  master_key: os.environ/LITELLM_MASTER_KEY
  database_url: os.environ/DATABASE_URL
  # Map Open WebUI headers for per-user spend/logs when ENABLE_FORWARD_USER_INFO_HEADERS=true
  user_header_mappings:
    - header_name: X-OpenWebUI-User-Id
      litellm_user_role: internal_user
    - header_name: X-OpenWebUI-User-Email
      litellm_user_role: customer

litellm_settings:
  extra_spend_tag_headers:
    - X-OpenWebUI-User-Name
